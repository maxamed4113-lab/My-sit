<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الرسمي للشيخ زكريا العدني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f7; }
        .font-amiri { font-family: 'Amiri', serif; }
        .header-bg { background: linear-gradient(to bottom, #1e3a3a, #2d5a5a); border-bottom: 4px solid #b59410; }
        .main-card { background: white; border: 1px solid #c5dada; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body class="text-gray-800">

    <header class="header-bg text-white py-12 text-center">
        <h1 class="text-4xl md:text-5xl font-amiri font-bold">الموقع الرسمي لفضيلة الشيخ زكريا العدني</h1>
        <p class="mt-2 text-emerald-100 italic font-bold">بإشراف إدارة الموقع</p>
    </header>

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="main-card shadow-xl">
            <div class="bg-emerald-800 text-white p-4 text-center text-xl font-bold italic">🎙️ قسم الدروس الصوتية</div>
            
            <div class="p-6">
                <div class="bg-emerald-50 border-2 border-emerald-100 rounded-2xl p-6 text-center shadow-inner">
                    <h3 class="text-2xl font-bold text-emerald-900 mb-4 font-amiri italic">شرح الأصول الثلاثة - الدرس الأول</h3>
                    
                    <div class="mb-6">
                        <audio controls class="w-full h-12 shadow-sm rounded-lg">
                            <source src="الأصول الثلاثة ١.mp3" type="audio/mpeg">
                            متصفحك لا يدعم المشغل.
                        </audio>
                    </div>

                    <a href="الأصول الثلاثة ١.mp3" download class="inline-block bg-emerald-700 hover:bg-emerald-900 text-white px-10 py-4 rounded-full font-bold shadow-lg transition transform hover:scale-105">
                        ⬇️ تحميل الدرس (MP3) مباشرة
                    </a>
                </div>

                <div class="mt-8 text-center text-gray-500 italic border-t pt-4">
                    سيتم إضافة باقي السلسلة والخطب فور رفعها..
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-8 text-gray-400 text-sm">
        جميع الحقوق محفوظة © 2026
    </footer>

</body>
</html>
